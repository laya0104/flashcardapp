<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Flashcard Quiz App</h1>

    <div class="card">
        <h2 id="question">Question</h2>
        <p id="answer" class="hidden">Answer</p>

        <button onclick="showAnswer()">Show Answer</button>
    </div>

    <div class="navigation">
        <button onclick="prevCard()">Previous</button>
        <button onclick="nextCard()">Next</button>
    </div>

    <div class="form">
        <h3>Add / Edit Flashcard</h3>

        <input type="text" id="newQuestion" placeholder="Enter Question">

        <input type="text" id="newAnswer" placeholder="Enter Answer">

        <button onclick="addCard()">Add Card</button>
        <button onclick="updateCard()">Update Card</button>
        <button onclick="deleteCard()">Delete Card</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
